name: mypy experiment

on: [push, pull_request]

jobs:
  mypy:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt mypy

      - name: Run mypy on vulnerabilities/improvers
        run: python -m mypy
